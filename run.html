```html
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>加油!</title>

<style>
body{font-family:Arial;text-align:center;background:#f7f7f7;overflow-x:hidden}

body::before{
content:"";
position:fixed;top:0;left:0;width:100%;height:100%;
background-image:url("background.png");
background-size:cover;background-position:center;
opacity:0.18;z-index:-1;
}

#raceArea{width:900px;margin:30px auto;position:relative}

.lane{
height:160px;
position:relative;
margin-bottom:12px;
border-radius:10px;
overflow:hidden;
background:#f0f0f0;
}

.lane:nth-child(2){background:#ffdede;}
.lane:nth-child(3){background:#deffde;}
.lane:nth-child(4){background:#ddeaff;}

.lane::after{
content:"";
position:absolute;
bottom:0;
height:50px;
left:0;right:0;
background:repeating-linear-gradient(
90deg,#444 0,#444 30px,transparent 30px,transparent 60px);
animation:groundMove 1.2s linear infinite;
opacity:0.35;
}

@keyframes groundMove{
from{background-position-x:0}
to{background-position-x:-60px}
}

.cloud{
position:absolute;
font-size:28px;
animation:cloudMove 20s linear infinite;
opacity:0.5;
}

@keyframes cloudMove{
from{transform:translateX(900px)}
to{transform:translateX(-200px)}
}

.cactus{
position:absolute;
bottom:20px;
font-size:28px;
animation:cactusMove 6s linear infinite;
}

@keyframes cactusMove{
from{transform:translateX(900px)}
to{transform:translateX(-200px)}
}

.horseWrap{
position:absolute;
left:0;top:10px;
display:flex;
align-items:center;
gap:10px;
transition:left 0.4s ease-out;
}

.horseName{
background:white;
padding:2px 6px;
border-radius:6px;
font-weight:bold;
}

.horse{height:200px}

.finishFlag{
position:absolute;
right:-5px;top:-5px;
font-size:48px;
}

/* 彩帶 */
.confetti{
position:absolute;
font-size:18px;
animation:fall 2s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-30px)}
100%{transform:translateY(220px)}
}

/* 勝利馬 */
.winnerHorse{
transform:scale(1.4);
filter:drop-shadow(0 0 20px gold)
drop-shadow(0 0 40px yellow);
z-index:1000;
}

/* 螢幕震動 */
.shake{
animation:shakeScreen 0.4s;
}

@keyframes shakeScreen{
0%{transform:translate(0,0)}
20%{transform:translate(-6px,4px)}
40%{transform:translate(6px,-4px)}
60%{transform:translate(-5px,3px)}
80%{transform:translate(5px,-3px)}
100%{transform:translate(0,0)}
}

/* JOJO 背景字 */
.jojoText{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
font-weight:bold;
color:rgba(0,0,0,0.15);
pointer-events:none;
z-index:1500;
letter-spacing:10px;
animation:jojoFade 1.5s forwards;
}

@keyframes jojoFade{
0%{opacity:0;transform:translate(-50%,-70%) scale(0.5)}
40%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
100%{opacity:0;transform:translate(-50%,-40%) scale(1.3)}
}

/* 音樂 */
#musicBtn{
position:fixed;
top:10px;
right:10px;
z-index:999;
}

/* 影片 */
#videoBox{
position:fixed;
top:50%;
left:-700px;
transform:translateY(-50%);
z-index:2000;
pointer-events:none;
}

#videoBox video{
width:500px;
border-radius:12px;
}

/* 撞進動畫 */
.videoCrashIn{
animation:crashIn 0.45s forwards;
}

.videoCrashOut{
animation:crashOut 0.6s forwards;
}

@keyframes crashIn{
0%{left:-700px;transform:translateY(-50%) scale(0.4) rotate(-25deg);}
70%{left:55%;transform:translate(-50%,-50%) scale(1.1) rotate(5deg);}
100%{left:50%;transform:translate(-50%,-50%) scale(1) rotate(0);}
}

@keyframes crashOut{
0%{left:50%;transform:translate(-50%,-50%) scale(1);}
100%{left:120%;transform:translate(-50%,-50%) scale(0.6) rotate(20deg);}
}

#winner{font-size:26px;margin-top:20px;color:green}

</style>
</head>

<body>

<audio id="bgm" loop>
<source src="dance-with-steel-ball-run.mp3">
</audio>

<button id="musicBtn" onclick="toggleMusic()">🔊</button>

<h1>🏇加油!</h1>

<div id="raceArea">

<div class="finishFlag">🏁</div>

<div class="lane">
<div class="cloud" style="top:10px">☁️</div>
<div class="cactus">🌵</div>
<div id="wrap1" class="horseWrap">
<div id="laneName1" class="horseName"></div>
<img class="horse" src="horse1.gif">
</div>
</div>

<div class="lane">
<div class="cloud" style="top:15px;animation-duration:25s">☁️</div>
<div class="cactus" style="animation-delay:2s">🌵</div>
<div id="wrap2" class="horseWrap">
<div id="laneName2" class="horseName"></div>
<img class="horse" src="horse2.gif">
</div>
</div>

<div class="lane">
<div class="cloud" style="top:20px;animation-duration:18s">☁️</div>
<div class="cactus" style="animation-delay:4s">🌵</div>
<div id="wrap3" class="horseWrap">
<div id="laneName3" class="horseName"></div>
<img class="horse" src="horse3.gif">
</div>
</div>

</div>

<div>

<div>
名字：<input id="name1" oninput="updateLaneName(0)">
<input id="input1">
<button onclick="encourage(0)">鼓勵</button>
<span id="count1">0</span>
</div>

<div>
名字：<input id="name2" oninput="updateLaneName(1)">
<input id="input2">
<button onclick="encourage(1)">鼓勵</button>
<span id="count2">0</span>
</div>

<div>
名字：<input id="name3" oninput="updateLaneName(2)">
<input id="input3">
<button onclick="encourage(2)">鼓勵</button>
<span id="count3">0</span>
</div>

<button onclick="finishRace()">🏁結算比賽</button>
<button onclick="restartGame()">重來</button>

</div>

<div id="winner"></div>

<div id="jojo"></div>

<div id="videoBox">
<video id="video"></video>
</div>

<script>

let counts=[0,0,0]
let distances=[0,0,0]

let isPlaying=false
function toggleMusic(){
let m=document.getElementById("bgm")
isPlaying?m.pause():m.play()
isPlaying=!isPlaying
}

window.addEventListener("click",()=>{
document.getElementById("bgm").play()
},{once:true})

function getHorseName(i){
let name=document.getElementById('name'+(i+1)).value.trim()
return name||((i+1)+'號馬')
}

function updateLaneName(i){
document.getElementById('laneName'+(i+1)).innerText=getHorseName(i)
}

/* JOJO背景字 */
function showJojo(){

let j=document.getElementById("jojo")

let text=document.createElement("div")
text.className="jojoText"
text.innerText="ゴゴゴゴゴ"

j.appendChild(text)

setTimeout(()=>{
text.remove()
},1500)

}

/* 播放影片 */
function playVideo(){

let videos=["dio.mp4","dio2.mp4"]
let randomVideo=videos[Math.floor(Math.random()*videos.length)]

let box=document.getElementById("videoBox")
let v=document.getElementById("video")

v.src=randomVideo
v.currentTime=0
v.volume=0.6

box.classList.remove("videoCrashOut")
box.classList.add("videoCrashIn")

showJojo()

document.body.classList.add("shake")
setTimeout(()=>{
document.body.classList.remove("shake")
},400)

v.play()

setTimeout(()=>{
box.classList.remove("videoCrashIn")
box.classList.add("videoCrashOut")
},1500)

}

function encourage(i){

let input=document.getElementById('input'+(i+1))
if(input.value.trim()==='') return

counts[i]++
document.getElementById('count'+(i+1)).innerText=counts[i]

let step=60
distances[i]=counts[i]*step
document.getElementById('wrap'+(i+1)).style.left=distances[i]+'px'

input.value=''

playVideo()

}

/* Enter鍵 = 所有鼓勵 */

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

for(let i=0;i<3;i++){

let input=document.getElementById('input'+(i+1))

if(input.value.trim()!==''){
encourage(i)
}

}

}

})

function finishRace(){

let max=Math.max(...counts)
let winners=[]

for(let i=0;i<3;i++){
if(counts[i]===max){
winners.push(i)

document.querySelector("#wrap"+(i+1)+" .horse")
.classList.add("winnerHorse")
}
}

let text='🏆 '

if(winners.length===1){
text+=getHorseName(winners[0])+' 獲勝！'
}else{
let names=winners.map(w=>getHorseName(w))
text+=names.join('、')+' 平手！'
}

document.getElementById('winner').innerText=text

}

function restartGame(){

counts=[0,0,0]
distances=[0,0,0]

for(let i=1;i<=3;i++){
document.getElementById('wrap'+i).style.left='0px'
document.getElementById('count'+i).innerText=0
document.getElementById('input'+i).value=''
document.getElementById('name'+i).value=''
document.getElementById('laneName'+i).innerText=''
}

document.querySelectorAll(".horse").forEach(h=>{
h.classList.remove("winnerHorse")
})

document.getElementById('winner').innerText=''

}

</script>

</body>
</html>
